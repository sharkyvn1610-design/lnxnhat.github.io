<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>LNXNhat System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    /* ═══════════ RESET & TOKENS ═══════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black:   #000000;
      --dark:    #050811;
      --panel:   #0a1128;
      --border:  #12357a;
      --glow:    #00f0ff;
      --accent:  #0072ff;
      --white:   #eaf2ff;
      --dim:     #708cb6;
      --success: #00ff66;
      --danger:  #ff0055;
    }
    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Exo 2', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      padding-top: 56px;
    }
    /* scanline overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,240,255,0.018) 2px, rgba(0,240,255,0.018) 4px);
      pointer-events: none;
      z-index: 9998;
    }

    /* ═══════════ TOPBAR ═══════════ */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 5000;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 20px;
      height: 56px;
      background: rgba(5,8,17,0.95);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px);
    }
    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.1rem;
      font-weight: 900;
      letter-spacing: 4px;
      flex-shrink: 0;
    }
    .logo span:first-child { color: var(--glow); text-shadow: 0 0 14px rgba(0,240,255,0.7); }
    .logo span:last-child  { color: var(--white); }
    .search-wrap {
      flex: 1;
      max-width: 320px;
      position: relative;
      display: none;
    }
    .search-wrap.show { display: block; }
    .search-wrap input {
      width: 100%;
      background: rgba(0,0,0,0.7);
      border: 1px solid var(--border);
      color: var(--white);
      padding: 7px 12px 7px 32px;
      border-radius: 4px;
      font-family: 'Exo 2';
      font-size: 0.88rem;
      transition: border-color 0.2s;
    }
    .search-wrap input:focus { border-color: var(--glow); outline: none; }
    .search-wrap input::placeholder { color: var(--dim); }
    .search-icon {
      position: absolute;
      left: 9px; top: 50%;
      transform: translateY(-50%);
      color: var(--dim);
      font-size: 0.82rem;
      pointer-events: none;
    }

    /* ═══════════ TIMER BANNER ═══════════ */
    .timer-banner {
      display: none;
      max-width: 300px;
      margin: 12px auto;
      padding: 10px;
      text-align: center;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.88rem;
      font-weight: bold;
      letter-spacing: 1px;
      color: var(--glow);
      border: 1px solid var(--glow);
      border-radius: 6px;
      background: rgba(0,240,255,0.05);
      box-shadow: 0 0 14px rgba(0,240,255,0.2);
    }

    /* ═══════════ VIEWS ═══════════ */
    .view {
      display: none;
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
      animation: fadeIn 0.25s ease-out;
    }
    .view.active { display: block; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }

    /* ═══════════ CARD GRID ═══════════ */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 18px;
      margin-top: 18px;
    }
    .sig-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .sig-card:hover { border-color: var(--glow); box-shadow: 0 0 16px rgba(0,240,255,0.15); }
    .sig-card .name  { font-weight: 600; font-size: 0.93rem; color: var(--glow); padding-bottom: 5px; border-bottom: 1px dashed var(--border); margin-bottom: 6px; }
    .sig-card .meta  { font-size: 0.78rem; color: var(--dim); margin-bottom: 6px; }
    .sig-card img    { width: 100%; height: 90px; object-fit: contain; background: #000; border-radius: 3px; }
    .add-card {
      background: rgba(0,114,255,0.04);
      border: 2px dashed var(--border);
      border-radius: 8px;
      min-height: 160px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .add-card:hover { border-color: var(--glow); background: rgba(0,240,255,0.04); }
    .add-card .plus  { font-size: 2.8rem; color: var(--dim); transition: color 0.2s, transform 0.2s; }
    .add-card:hover .plus { color: var(--glow); transform: scale(1.1); }
    .add-card .label { font-family:'Orbitron'; font-size:0.7rem; color:var(--dim); margin-top:6px; }
    .empty-msg { color:var(--dim); font-family:'Orbitron'; font-size:0.78rem; grid-column:1/-1; padding:24px 0; }

    /* ═══════════ FILTERS ═══════════ */
    .filters-bar { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px; }
    .filters-bar select {
      background: var(--dark); border: 1px solid var(--border);
      color: var(--white); padding: 8px 10px;
      border-radius: 4px; font-family:'Exo 2'; flex:1; min-width:130px;
    }

    /* ═══════════ FORM ═══════════ */
    .form-box {
      max-width: 580px;
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 26px;
    }
    .form-box h3 {
      font-family: 'Orbitron';
      color: var(--glow);
      text-align: center;
      margin-bottom: 22px;
      font-size: 0.95rem;
      letter-spacing: 2px;
    }
    .fgroup { margin-bottom: 16px; }
    .fgroup label {
      display: block;
      font-family: 'Orbitron';
      font-size: 0.68rem;
      color: var(--dim);
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .fgroup input,
    .fgroup textarea,
    .fgroup select {
      width: 100%;
      background: #000;
      border: 1px solid var(--border);
      color: #fff;
      padding: 10px;
      border-radius: 4px;
      font-family: 'Exo 2';
      font-size: 0.9rem;
      transition: border-color 0.2s;
    }
    .fgroup input:focus,
    .fgroup textarea:focus,
    .fgroup select:focus { border-color: var(--glow); outline: none; }

    /* ═══════════ CANVAS ═══════════ */
    .canvas-wrap {
      position: relative;
      background: #000;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    .canvas-wrap canvas {
      display: block;
      cursor: crosshair;
      touch-action: none;
      /* width/height set via JS */
    }
    .canvas-btns {
      position: absolute;
      top: 8px; right: 8px;
      display: flex; gap: 6px;
      z-index: 10;
    }
    .cbtn {
      background: rgba(0,0,0,0.7);
      border: 1px solid var(--dim);
      color: var(--white);
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 0.72rem;
      cursor: pointer;
      font-weight: bold;
      letter-spacing: 0.5px;
    }
    .cbtn.danger { border-color: var(--danger); color: var(--danger); }
    .cbtn.danger:hover { background: var(--danger); color: #fff; }

    /* ═══════════ BUTTONS ═══════════ */
    .btn {
      padding: 10px 20px;
      font-family: 'Orbitron';
      font-weight: bold;
      font-size: 0.78rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none !important; }
    .btn:hover:not(:disabled) { opacity: 0.85; transform: translateY(-1px); }
    .btn-primary   { background: var(--accent); color: #fff; }
    .btn-secondary { background: #1c2638; color: var(--white); border: 1px solid var(--border); }
    .btn-danger    { background: rgba(255,0,85,0.1); color: var(--danger); border: 1px solid var(--danger); }
    .btn-row { display: flex; gap: 10px; margin-top: 20px; }

    /* ═══════════ TAG BADGE ═══════════ */
    .tag-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.68rem;
      font-weight: bold;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
      margin-bottom: 5px;
    }

    /* ═══════════ DETAIL CARD ═══════════ */
    .detail-row { margin-bottom: 10px; font-size: 0.9rem; }
    .detail-row b { color: var(--dim); font-size: 0.75rem; font-family:'Orbitron'; letter-spacing:1px; display:block; margin-bottom:2px; }
    .detail-sig { width:100%; margin-top:12px; border:1px solid var(--border); border-radius:4px; background:#000; }

    /* ═══════════ ERROR ═══════════ */
    .error-page { text-align:center; padding-top:80px; }
    .error-page .code { font-family:'Orbitron'; font-size:5rem; font-weight:900; color:var(--danger); text-shadow:0 0 30px rgba(255,0,85,0.5); }
    .error-page .msg  { font-family:'Orbitron'; font-size:1.1rem; color:var(--dim); margin-top:10px; }

    /* ═══════════ FULLSCREEN MODAL ═══════════ */
    .fs-modal {
      display: none;
      position: fixed; inset: 0;
      background: #000;
      z-index: 10000;
      flex-direction: column;
      padding: 16px;
      gap: 12px;
    }
    .fs-modal.show { display: flex; }
    .fs-modal-header { display:flex; align-items:center; justify-content:space-between; }
    .fs-modal-header span { font-family:'Orbitron'; color:var(--glow); font-size:0.9rem; letter-spacing:2px; }
    .fs-canvas-wrap {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      position: relative;
      min-height: 0;
    }
    .fs-canvas-wrap canvas { display:block; touch-action:none; cursor:crosshair; }
    .fs-btns { display:flex; gap:10px; flex-shrink:0; }

    /* ═══════════ TOAST ═══════════ */
    #toast-root {
      position: fixed;
      bottom: 28px; left: 50%;
      transform: translateX(-50%);
      z-index: 99999;
      display: flex; flex-direction:column;
      align-items: center; gap: 8px;
      pointer-events: none;
    }
    .toast {
      font-family: 'Orbitron';
      font-size: 0.75rem;
      letter-spacing: 1px;
      padding: 11px 22px;
      border-radius: 6px;
      border: 1px solid;
      min-width: 230px;
      text-align: center;
      pointer-events: none;
      animation: tIn 0.25s ease, tOut 0.35s ease 2.65s forwards;
    }
    .toast.success { background:rgba(0,255,102,0.08); border-color:var(--success); color:var(--success); box-shadow:0 0 16px rgba(0,255,102,0.2); }
    .toast.error   { background:rgba(255,0,85,0.08);  border-color:var(--danger);  color:var(--danger);  box-shadow:0 0 16px rgba(255,0,85,0.2); }
    .toast.loading { background:rgba(0,114,255,0.08); border-color:var(--glow);    color:var(--glow);    animation:tIn 0.25s ease; }
    @keyframes tIn  { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    @keyframes tOut { from{opacity:1} to{opacity:0;transform:translateY(6px)} }
  </style>
</head>
<body>

<!-- Toast -->
<div id="toast-root"></div>

<!-- Topbar -->
<div class="topbar">
  <div class="logo"><span>LNX</span><span>NHAT</span></div>
  <div id="search-wrap" class="search-wrap">
    <span class="search-icon">🔍</span>
    <input id="search-input" type="text" placeholder="Tìm kiếm tên..." oninput="handleSearch()" autocomplete="off" />
  </div>
</div>

<!-- Timer -->
<div id="timer-banner" class="timer-banner">
  THỜI GIAN TRUY CẬP: <span id="timer-val">01:30</span>
</div>

<!-- ═══ VIEWS ═══ -->
<div id="view-error" class="view">
  <div class="error-page">
    <div class="code">403</div>
    <div class="msg">ACCESS DENIED</div>
  </div>
</div>

<!-- Guest Form -->
<div id="view-guest-create" class="view">
  <div class="form-box">
    <h3>XÁC MINH DANH TÍNH</h3>
    <div class="fgroup"><label>Họ và Tên</label><input id="g-name" type="text" autocomplete="off" /></div>
    <div class="fgroup">
      <label>Lớp &nbsp;(vd: 8/5 · 11A2 · 11/2)</label>
      <input id="g-class" type="text" autocomplete="off" placeholder="Nhập lớp..." />
    </div>
    <div class="fgroup"><label>Ngày sinh</label><input id="g-birth" type="date" /></div>
    <div class="fgroup"><label>Ghi chú</label><textarea id="g-note" rows="2"></textarea></div>
    <div class="fgroup">
      <label>Chữ ký</label>
      <div class="canvas-wrap" id="wrap-g-canvas">
        <canvas id="g-canvas"></canvas>
        <div class="canvas-btns">
          <button class="cbtn" onclick="openFS('g-canvas')">MỞ RỘNG</button>
          <button class="cbtn danger" onclick="clearCanvas('g-canvas')">XÓA</button>
        </div>
      </div>
    </div>
    <button id="btn-g-submit" class="btn btn-primary" style="width:100%;margin-top:4px" onclick="handleGuestSubmit()">
      HOÀN THÀNH &amp; MỞ KHÓA
    </button>
  </div>
</div>

<!-- Guest Home -->
<div id="view-guest-home" class="view">
  <div class="card-grid" id="guest-grid"></div>
</div>

<!-- Guest Detail -->
<div id="view-guest-detail" class="view">
  <div class="form-box" id="guest-detail-box"></div>
</div>

<!-- Admin Home -->
<div id="view-ad-home" class="view">
  <div class="filters-bar">
    <select id="filter-class" onchange="renderGrid('ad-grid',true)">
      <option value="ALL">-- Tất cả Lớp --</option>
    </select>
    <select id="filter-tag" onchange="renderGrid('ad-grid',true)">
      <option value="ALL">-- Tất cả Mối quan hệ --</option>
    </select>
    <button class="btn btn-secondary" onclick="go('#/aD/tags')">QUẢN LÝ TAGS</button>
  </div>
  <div class="card-grid">
    <div class="add-card" onclick="go('#/aD/create')">
      <div class="plus">+</div>
      <div class="label">THÊM HỒ SƠ</div>
    </div>
    <div id="ad-grid" style="display:contents"></div>
  </div>
</div>

<!-- Admin Tags -->
<div id="view-ad-tags" class="view">
  <div class="form-box">
    <h3>TẠO MỐI QUAN HỆ</h3>
    <div class="fgroup"><label>Tên Tag</label><input id="tag-name" type="text" autocomplete="off" /></div>
    <div class="fgroup"><label>Màu nền</label><input id="tag-color" type="color" style="height:40px;padding:2px;" /></div>
    <div class="btn-row">
      <button class="btn btn-secondary" style="flex:1" onclick="go('#/aD/home')">QUAY LẠI</button>
      <button id="btn-tag" class="btn btn-primary" style="flex:2" onclick="handleCreateTag()">TẠO TAG</button>
    </div>
  </div>
</div>

<!-- Admin Detail -->
<div id="view-ad-detail" class="view">
  <div class="form-box" id="ad-detail-box"></div>
</div>

<!-- Admin Create (KHÔNG có mối quan hệ) -->
<div id="view-ad-create" class="view">
  <div class="form-box">
    <h3>TẠO HỒ SƠ</h3>
    <div class="fgroup"><label>Họ và Tên</label><input id="ad-name" type="text" autocomplete="off" /></div>
    <div class="fgroup">
      <label>Lớp &nbsp;(vd: 8/5 · 11A2 · 11/2)</label>
      <input id="ad-class" type="text" autocomplete="off" placeholder="Nhập lớp..." />
    </div>
    <div class="fgroup"><label>Ngày sinh</label><input id="ad-birth" type="date" /></div>
    <div class="fgroup"><label>Ghi chú</label><textarea id="ad-note" rows="2"></textarea></div>
    <div class="fgroup">
      <label>Chữ ký</label>
      <div class="canvas-wrap" id="wrap-ad-canvas">
        <canvas id="ad-canvas"></canvas>
        <div class="canvas-btns">
          <button class="cbtn" onclick="openFS('ad-canvas')">MỞ RỘNG</button>
          <button class="cbtn danger" onclick="clearCanvas('ad-canvas')">XÓA</button>
        </div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" style="flex:1" onclick="go('#/aD/home')">HỦY</button>
      <button id="btn-ad-submit" class="btn btn-primary" style="flex:2" onclick="handleAdminSubmit()">LƯU HỒ SƠ</button>
    </div>
  </div>
</div>

<!-- Admin Edit (CÓ mối quan hệ) -->
<div id="view-ad-edit" class="view">
  <div class="form-box">
    <h3>CHỈNH SỬA HỒ SƠ</h3>
    <input type="hidden" id="edit-id" />
    <div class="fgroup"><label>Họ và Tên</label><input id="edit-name" type="text" autocomplete="off" /></div>
    <div class="fgroup">
      <label>Lớp &nbsp;(vd: 8/5 · 11A2 · 11/2)</label>
      <input id="edit-class" type="text" autocomplete="off" />
    </div>
    <div class="fgroup"><label>Ngày sinh</label><input id="edit-birth" type="date" /></div>
    <div class="fgroup"><label>Mối quan hệ</label><select id="edit-relId"></select></div>
    <div class="fgroup"><label>Ghi chú</label><textarea id="edit-note" rows="3"></textarea></div>
    <div class="btn-row">
      <button class="btn btn-secondary" style="flex:1" onclick="go('#/aD/home')">HỦY BỎ</button>
      <button id="btn-edit-submit" class="btn btn-primary" style="flex:2" onclick="saveAdminEdit()">LƯU THAY ĐỔI</button>
    </div>
  </div>
</div>

<!-- Fullscreen Signature Modal -->
<div id="fs-modal" class="fs-modal">
  <div class="fs-modal-header">
    <span>✍ KÝ TÊN TOÀN MÀN HÌNH</span>
    <button class="cbtn danger" onclick="clearCanvas('fs-canvas')">XÓA SẠCH</button>
  </div>
  <div class="fs-canvas-wrap" id="fs-wrap">
    <canvas id="fs-canvas"></canvas>
  </div>
  <div class="fs-btns">
    <button class="btn btn-secondary" style="flex:1" onclick="closeFS(false)">HỦY</button>
    <button class="btn btn-primary" style="flex:3" onclick="closeFS(true)">✔ HOÀN THÀNH</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════ -->
<script src="backup.js"></script>
<script>
'use strict';

// ── State ─────────────────────────────────────────────────────
let timerInterval = null;
let fsSrcId       = null;       // canvas id fullscreen đang phục vụ

// canvasState[id] = { el, ctx, drawing, cssW, cssH, dpr }
const canvasState = {};

// ═══════════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════════
let loadingToastEl = null;

function toast(msg, type = 'success') {
  const root = document.getElementById('toast-root');
  const el   = document.createElement('div');
  el.className   = `toast ${type}`;
  el.textContent = msg;
  root.appendChild(el);
  if (type !== 'loading') setTimeout(() => el.remove(), 3000);
  return el;
}

function startLoading(btnId, txt = '⏳ ĐANG GỬI...') {
  loadingToastEl = toast(txt, 'loading');
  const btn = document.getElementById(btnId);
  if (btn) { btn.disabled = true; btn._orig = btn.textContent; btn.textContent = txt; }
}

function stopLoading(btnId, result) {
  if (loadingToastEl) { loadingToastEl.remove(); loadingToastEl = null; }
  const btn = document.getElementById(btnId);
  if (btn) { btn.disabled = false; btn.textContent = btn._orig || btn.textContent; }
  if (!result) return;
  result.success
    ? toast('✅ ĐÃ LƯU THÀNH CÔNG!', 'success')
    : toast('❌ LỖI: ' + (result.error || 'Không gửi được'), 'error');
}

// ═══════════════════════════════════════════════════════════════
// CANVAS — không biến dạng, DPR-aware, mực trắng nền đen
// ═══════════════════════════════════════════════════════════════
function initCanvas(id) {
  const el      = document.getElementById(id);
  if (!el) return;
  const wrapper = el.parentElement;
  const dpr     = Math.min(window.devicePixelRatio || 1, 2);

  // CSS dimensions từ wrapper (layout đã ổn định)
  const cssW = wrapper.clientWidth  || 300;
  const cssH = id === 'fs-canvas'
    ? (wrapper.clientHeight || 500)
    : 180;

  // Internal canvas = CSS × DPR → sắc nét màn Retina
  el.width  = Math.round(cssW * dpr);
  el.height = Math.round(cssH * dpr);

  // CSS size PHẢI khớp với display size → không biến dạng
  el.style.width  = cssW + 'px';
  el.style.height = cssH + 'px';

  const ctx = el.getContext('2d');
  ctx.scale(dpr, dpr);               // Hệ tọa độ = CSS pixels
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, cssW, cssH);
  ctx.strokeStyle = '#ffffff';       // Mực trắng
  ctx.lineWidth   = id === 'fs-canvas' ? 4 : 2.5;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';

  canvasState[id] = { el, ctx, drawing: false, cssW, cssH, dpr };

  // ── Event helpers ────────────────────────────────────────────
  // Tọa độ chuột/chạm → CSS coords (không bị scale lệch)
  const pos = e => {
    const r   = el.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return {
      x: (src.clientX - r.left) * (cssW / r.width),
      y: (src.clientY - r.top)  * (cssH / r.height)
    };
  };

  const down = e => {
    canvasState[id].drawing = true;
    ctx.beginPath();
    const p = pos(e); ctx.moveTo(p.x, p.y);
  };
  const move = e => {
    if (!canvasState[id].drawing) return;
    const p = pos(e); ctx.lineTo(p.x, p.y); ctx.stroke();
  };
  const up = () => { canvasState[id].drawing = false; };

  // Xóa listeners cũ bằng AbortController
  if (canvasState[id]._abort) canvasState[id]._abort.abort();
  const ac  = new AbortController();
  const opt = { signal: ac.signal };
  canvasState[id]._abort = ac;

  el.addEventListener('mousedown',  down, opt);
  el.addEventListener('mousemove',  move, opt);
  el.addEventListener('mouseup',    up,   opt);
  el.addEventListener('mouseleave', up,   opt);
  el.addEventListener('touchstart', e => { e.preventDefault(); down(e); }, { ...opt, passive: false });
  el.addEventListener('touchmove',  e => { e.preventDefault(); move(e); }, { ...opt, passive: false });
  el.addEventListener('touchend',   up, opt);
}

function clearCanvas(id) {
  const s = canvasState[id];
  if (!s) return;
  s.ctx.fillStyle = '#000';
  s.ctx.fillRect(0, 0, s.cssW, s.cssH);
}

// Xuất canvas → PNG nhị phân Full HD 1920×1080
// Threshold từng pixel: sáng > 64 → trắng, còn lại → đen
function exportBinaryPNG(id) {
  const s = canvasState[id];
  if (!s) return '';
  const W = 1920, H = 1080;
  const off = document.createElement('canvas');
  off.width = W; off.height = H;
  const octx = off.getContext('2d');

  octx.fillStyle = '#000';
  octx.fillRect(0, 0, W, H);
  octx.drawImage(s.el, 0, 0, W, H);  // Scale lên Full HD

  // Binary threshold
  const id2 = octx.getImageData(0, 0, W, H);
  const d   = id2.data;
  for (let i = 0; i < d.length; i += 4) {
    const v = (d[i] + d[i+1] + d[i+2]) / 3 > 64 ? 255 : 0;
    d[i] = d[i+1] = d[i+2] = v;
    d[i+3] = 255;
  }
  octx.putImageData(id2, 0, 0);
  return off.toDataURL('image/png'); // Lossless, nén tốt ảnh nhị phân
}

// ── Fullscreen ───────────────────────────────────────────────
function openFS(srcId) {
  fsSrcId = srcId;
  document.getElementById('fs-modal').classList.add('show');
  // rAF×2: đợi modal render xong mới đo kích thước
  requestAnimationFrame(() => requestAnimationFrame(() => {
    const prev = canvasState[srcId]?.el.toDataURL();
    initCanvas('fs-canvas');
    if (prev) {
      const img = new Image();
      img.onload = () => {
        const s = canvasState['fs-canvas'];
        s.ctx.drawImage(img, 0, 0, s.cssW, s.cssH);
      };
      img.src = prev;
    }
  }));
}

function closeFS(save) {
  if (save && fsSrcId && canvasState['fs-canvas'] && canvasState[fsSrcId]) {
    const fs  = canvasState['fs-canvas'];
    const dst = canvasState[fsSrcId];
    dst.ctx.fillStyle = '#000';
    dst.ctx.fillRect(0, 0, dst.cssW, dst.cssH);
    dst.ctx.drawImage(fs.el, 0, 0, fs.cssW, fs.cssH, 0, 0, dst.cssW, dst.cssH);
  }
  document.getElementById('fs-modal').classList.remove('show');
}

// ═══════════════════════════════════════════════════════════════
// TAG HELPERS
// ═══════════════════════════════════════════════════════════════
function tagInfo(relId) {
  return (window.tagsDatabase || []).find(t => t.tagId === relId) || null;
}

function populateDropdowns() {
  const tags = window.tagsDatabase || [];
  const db   = window.localDatabase || [];

  const tagOpts  = '<option value="">-- Không có --</option>' +
    tags.map(t => `<option value="${t.tagId}">${t.tagName}</option>`).join('');
  const ftOpts   = '<option value="ALL">-- Tất cả Mối quan hệ --</option>' +
    tags.map(t => `<option value="${t.tagId}">${t.tagName}</option>`).join('');
  const classes  = [...new Set(db.map(i => i.class).filter(Boolean))];
  const fcOpts   = '<option value="ALL">-- Tất cả Lớp --</option>' +
    classes.map(c => `<option value="${c}">${c}</option>`).join('');

  const set = (id, html) => { const el = document.getElementById(id); if (el) el.innerHTML = html; };
  set('edit-relId', tagOpts);
  set('filter-tag', ftOpts);
  set('filter-class', fcOpts);
}

// ═══════════════════════════════════════════════════════════════
// GRID RENDER
// ═══════════════════════════════════════════════════════════════
function renderGrid(containerId, isAdmin) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = '';

  let data = window.localDatabase || [];

  if (isAdmin) {
    const fc = document.getElementById('filter-class')?.value;
    const ft = document.getElementById('filter-tag')?.value;
    if (fc && fc !== 'ALL') data = data.filter(i => i.class === fc);
    if (ft && ft !== 'ALL') data = data.filter(i => i.relId === ft);
  }

  const kw = document.getElementById('search-input')?.value.trim().toLowerCase() || '';
  if (kw) data = data.filter(i => i.name.toLowerCase().includes(kw));

  if (!data.length) {
    el.innerHTML = `<p class="empty-msg">${kw ? `🔍 Không tìm thấy "${kw}"` : 'Chưa có hồ sơ nào.'}</p>`;
    return;
  }

  data.forEach(item => {
    const tag  = tagInfo(item.relId);
    const card = document.createElement('div');
    card.className = 'sig-card';
    card.onclick   = () => go(isAdmin ? `#/aD/id?=${item.id}` : `#/guest/id?=${item.id}`);

    const nameHtml = kw
      ? item.name.replace(new RegExp(`(${kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'),
          '<mark style="background:rgba(0,240,255,0.22);color:var(--glow)">$1</mark>')
      : item.name;
    const tagHtml = tag
      ? `<div class="tag-badge" style="background:${tag.tagColor}">${tag.tagName}</div>`
      : '';

    card.innerHTML = `
      <div class="name">${nameHtml}</div>
      ${tagHtml}
      <div class="meta">ID: ${item.id} &nbsp;|&nbsp; Lớp: ${item.class || '—'}</div>
      <img src="${item.sig || ''}" loading="lazy" />
    `;
    el.appendChild(card);
  });
}

function handleSearch() {
  const h = location.hash;
  if (h.includes('aD/home'))    renderGrid('ad-grid', true);
  if (h.includes('guest/home')) renderGrid('guest-grid', false);
}

window.refreshUI = () => {
  populateDropdowns();
  const h = location.hash;
  if (h.includes('aD/home'))    renderGrid('ad-grid', true);
  if (h.includes('guest/home')) renderGrid('guest-grid', false);
};

// ═══════════════════════════════════════════════════════════════
// DETAIL VIEW
// ═══════════════════════════════════════════════════════════════
function showDetail(id, boxId, isAdmin) {
  const item = (window.localDatabase || []).find(i => i.id === id);
  const box  = document.getElementById(boxId);
  if (!item || !box) return;

  const tag  = tagInfo(item.relId);
  const tHtml = tag ? `<div class="tag-badge" style="background:${tag.tagColor}">${tag.tagName}</div>` : '';
  const tsHtml = item.timestamp
    ? `<div class="detail-row" style="margin-top:8px"><b>THỜI GIAN</b><span style="color:var(--dim);font-size:0.8rem">${item.timestamp}</span></div>`
    : '';
  const adminBtns = isAdmin
    ? `<button class="btn btn-primary"  style="flex:1" onclick="go('#/aD/edit?=${item.id}')">SỬA</button>
       <button class="btn btn-danger"   style="flex:1" onclick="deleteRecord('${item.id}')">XÓA</button>`
    : '';

  box.innerHTML = `
    <h3 style="font-family:'Orbitron';color:var(--glow);text-align:center;margin-bottom:18px;font-size:0.88rem">HỒ SƠ — ${item.id}</h3>
    <div class="detail-row"><b>HỌ TÊN</b>${item.name}</div>
    <div class="detail-row"><b>LỚP</b>${item.class || '—'}</div>
    <div class="detail-row"><b>NGÀY SINH</b>${item.birth || '—'}</div>
    <div class="detail-row"><b>MỐI QUAN HỆ</b>${tHtml || '—'}</div>
    <div class="detail-row"><b>GHI CHÚ</b>${item.note || '—'}</div>
    <div class="detail-row"><b>PHIÊN BẢN</b>${item.status || 'Gốc'}</div>
    ${tsHtml}
    <img class="detail-sig" src="${item.sig || ''}" />
    <div class="btn-row">
      <button class="btn btn-secondary" style="flex:1" onclick="go('${isAdmin ? '#/aD/home' : '#/guest/home'}')">QUAY LẠI</button>
      ${adminBtns}
    </div>
  `;
}

// ═══════════════════════════════════════════════════════════════
// FORM RESET
// ═══════════════════════════════════════════════════════════════
function resetForm(prefix, canvasId) {
  ['name','class','birth','note'].forEach(f => {
    const el = document.getElementById(`${prefix}-${f}`);
    if (el) el.value = '';
  });
  // Canvas được reinit khi routing, nên chỉ cần xóa nội dung nếu đã init
  setTimeout(() => clearCanvas(canvasId), 30);
}

// ═══════════════════════════════════════════════════════════════
// SUBMIT HANDLERS
// ═══════════════════════════════════════════════════════════════
async function handleGuestSubmit() {
  const name = document.getElementById('g-name').value.trim();
  if (!name) { toast('⚠️ Vui lòng nhập họ tên!', 'error'); return; }

  const payload = {
    action: 'ADD_RECORD',
    id:     generateID(5),
    name,
    class:  document.getElementById('g-class').value.trim(),
    birth:  document.getElementById('g-birth').value,
    note:   document.getElementById('g-note').value.trim(),
    sig:    exportBinaryPNG('g-canvas'),
    status: '', relId: ''
  };

  startLoading('btn-g-submit');
  const res = await sendToDrive(payload);
  stopLoading('btn-g-submit', res);

  if (res.success) {
    localStorage.setItem('lnxnhat_timer_end', String(Date.now() + 90000));
    localStorage.setItem('lnxnhat_locked', 'false');
    sessionStorage.setItem('guest_completed', 'true');
    setTimeout(() => go('#/guest/home'), 1200);
  }
}

async function handleAdminSubmit() {
  const name = document.getElementById('ad-name').value.trim();
  if (!name) { toast('⚠️ Vui lòng điền họ tên!', 'error'); return; }

  const payload = {
    action: 'ADD_RECORD',
    id:     generateID(5),
    name,
    class:  document.getElementById('ad-class').value.trim(),
    birth:  document.getElementById('ad-birth').value,
    note:   document.getElementById('ad-note').value.trim(),
    sig:    exportBinaryPNG('ad-canvas'),
    relId:  '', status: ''
  };

  startLoading('btn-ad-submit');
  const res = await sendToDrive(payload);
  stopLoading('btn-ad-submit', res);
  if (res.success) setTimeout(() => go('#/aD/home'), 1200);
}

async function saveAdminEdit() {
  const id   = document.getElementById('edit-id').value;
  const orig = (window.localDatabase || []).find(i => i.id === id);
  if (!orig) return;

  const nextFix = typeof window.getNextFixNumber === 'function'
    ? window.getNextFixNumber(id) : 1;

  const payload = {
    action: 'ADD_RECORD',
    id,
    name:   document.getElementById('edit-name').value.trim(),
    class:  document.getElementById('edit-class').value.trim(),
    birth:  document.getElementById('edit-birth').value,
    note:   document.getElementById('edit-note').value.trim(),
    relId:  document.getElementById('edit-relId').value,
    sig:    orig.sig,
    status: 'fix' + nextFix
  };

  startLoading('btn-edit-submit');
  const res = await sendToDrive(payload);
  stopLoading('btn-edit-submit', res);
  if (res.success) setTimeout(() => go('#/aD/home'), 1200);
}

async function deleteRecord(id) {
  if (!confirm('Đưa hồ sơ này vào trạng thái ẩn?')) return;
  const res = await sendToDrive({ action: 'REMOVE_RECORD', id });
  if (res.success) { toast('🗑 Đã ẩn hồ sơ', 'success'); setTimeout(() => go('#/aD/home'), 1000); }
  else toast('❌ ' + (res.error || 'Lỗi'), 'error');
}

async function handleCreateTag() {
  const name = document.getElementById('tag-name').value.trim();
  if (!name) { toast('⚠️ Nhập tên Tag!', 'error'); return; }
  const payload = {
    action:   'ADD_TAG',
    tagId:    generateID(3),
    tagName:  name,
    tagColor: document.getElementById('tag-color').value
  };
  startLoading('btn-tag');
  const res = await sendToDrive(payload);
  stopLoading('btn-tag', res);
  if (res.success) setTimeout(() => go('#/aD/home'), 1200);
}

// ═══════════════════════════════════════════════════════════════
// TIMER
// ═══════════════════════════════════════════════════════════════
function startTimer() {
  if (timerInterval) clearInterval(timerInterval);
  const end = parseInt(localStorage.getItem('lnxnhat_timer_end') || '0');
  timerInterval = setInterval(() => {
    const left = end - Date.now();
    if (left <= 0) {
      clearInterval(timerInterval);
      localStorage.setItem('lnxnhat_locked', 'true');
      go('#/error');
    } else {
      const m = String(Math.floor(left / 60000)).padStart(2,'0');
      const s = String(Math.floor((left / 1000) % 60)).padStart(2,'0');
      document.getElementById('timer-val').textContent = `${m}:${s}`;
    }
  }, 250);
}

// ═══════════════════════════════════════════════════════════════
// ROUTER
// ═══════════════════════════════════════════════════════════════
function go(hash) { location.hash = hash; }

function route() {
  const raw   = location.hash || '#/';
  const clean = raw.replace(/^#\/?/, '');

  // ── Cổng bảo mật ────────────────────────────────────────────
  if (raw === '#/guest') {
    sessionStorage.setItem('gate_guest', 'true');
    go('#/guest/create'); return;
  }
  if (raw === '#/aD') {
    sessionStorage.setItem('gate_admin', 'true');
    go('#/aD/home'); return;
  }
  if (clean.startsWith('guest/create') && sessionStorage.getItem('gate_guest') !== 'true') {
    go('#/error'); return;
  }
  if (clean.startsWith('aD') && sessionStorage.getItem('gate_admin') !== 'true') {
    go('#/error'); return;
  }
  const guestViewable = clean.startsWith('guest/home') ||
    (clean.startsWith('guest/id') && !clean.endsWith('/create'));
  if (guestViewable && (
    localStorage.getItem('lnxnhat_locked') === 'true' ||
    !localStorage.getItem('lnxnhat_timer_end') ||
    sessionStorage.getItem('guest_completed') !== 'true'
  )) { go('#/error'); return; }

  // ── Layout helpers ───────────────────────────────────────────
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));

  const timerEl  = document.getElementById('timer-banner');
  const searchEl = document.getElementById('search-wrap');
  timerEl.style.display  = guestViewable ? 'block' : 'none';
  searchEl.classList.toggle('show',
    clean === 'aD/home' || clean === 'guest/home');
  if (!searchEl.classList.contains('show')) {
    document.getElementById('search-input').value = '';
  }

  const show = id => document.getElementById(id)?.classList.add('active');

  // ── Route map ────────────────────────────────────────────────
  if (clean === 'guest/create') {
    resetForm('g', 'g-canvas');
    show('view-guest-create');
    setTimeout(() => initCanvas('g-canvas'), 60);
  }
  else if (clean === 'guest/home') {
    window.refreshUI();
    show('view-guest-home');
    startTimer();
  }
  else if (clean.startsWith('guest/id') && !clean.endsWith('/create')) {
    showDetail(raw.split('?=')[1], 'guest-detail-box', false);
    show('view-guest-detail');
    startTimer();
  }
  else if (clean === 'aD/home') {
    window.refreshUI();
    show('view-ad-home');
  }
  else if (clean === 'aD/tags') {
    show('view-ad-tags');
  }
  else if (clean.startsWith('aD/id')) {
    showDetail(raw.split('?=')[1], 'ad-detail-box', true);
    show('view-ad-detail');
  }
  else if (clean.startsWith('aD/edit')) {
    const t = (window.localDatabase || []).find(i => i.id === raw.split('?=')[1]);
    if (t) {
      populateDropdowns();
      document.getElementById('edit-id').value    = t.id;
      document.getElementById('edit-name').value  = t.name;
      document.getElementById('edit-class').value = t.class;
      document.getElementById('edit-birth').value = t.birth;
      document.getElementById('edit-relId').value = t.relId || '';
      document.getElementById('edit-note').value  = t.note;
    }
    show('view-ad-edit');
  }
  else if (clean === 'aD/create') {
    resetForm('ad', 'ad-canvas');
    show('view-ad-create');
    setTimeout(() => initCanvas('ad-canvas'), 60);
  }
  else {
    show('view-error');
  }
}

window.addEventListener('hashchange', route);
window.addEventListener('load', () => {
  const h = location.hash;
  if (h !== '#/guest' && h !== '#/aD') {
    if (h.includes('guest/create') && sessionStorage.getItem('gate_guest') !== 'true') { go('#/error'); return; }
    if (h.includes('aD/')          && sessionStorage.getItem('gate_admin') !== 'true')  { go('#/error'); return; }
  }
  route();
});
</script>
