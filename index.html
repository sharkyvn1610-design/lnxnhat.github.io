<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LNXNhat System — Matrix Router</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --black:       #000000;
      --dark:        #050811;
      --panel:       #0a1128;
      --border:      #12357a;
      --blue-glow:   #00f0ff;
      --blue-accent: #0072ff;
      --white:       #eaf2ff;
      --dim:         #708cb6;
      --success:     #00ff66;
      --danger:      #ff0055;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--black); color: var(--white); font-family: 'Exo 2', sans-serif; min-height: 100vh; overflow-x: hidden; }
    
    body::before {
      content: ''; position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 240, 255, 0.02) 2px, rgba(0, 240, 255, 0.02) 4px);
      pointer-events: none; z-index: 9999;
    }

    /* HEADER CHỨA LOGO LNXNHAT 2 MÀU NGUYÊN BẢN */
    header { text-align: center; padding: 35px 10px 15px 10px; }
    .logo-main { font-family: 'Orbitron', sans-serif; font-size: 2.8rem; font-weight: 900; letter-spacing: 6px; }
    .logo-main .part-1 { color: var(--blue-glow); text-shadow: 0 0 15px rgba(0, 240, 255, 0.6); }
    .logo-main .part-2 { color: var(--white); text-shadow: 0 0 10px rgba(234, 242, 255, 0.3); }
    .logo-sub { font-family: 'Share Tech Mono', monospace; font-size: 0.85rem; color: var(--dim); letter-spacing: 3px; margin-top: 5px; }

    /* BANNER ĐẾM NGƯỢC THỜI GIAN KHÓA WEB GUEST */
    .timer-banner { background: rgba(0, 240, 255, 0.05); border: 1px solid var(--blue-glow); color: var(--blue-glow); font-family: 'Orbitron', sans-serif; padding: 12px; text-align: center; border-radius: 6px; max-width: 320px; margin: 0 auto 25px auto; font-weight: bold; display: none; box-shadow: 0 0 12px rgba(0,240,255,0.2); letter-spacing: 1px; }

    .view { display: none; padding: 10px 20px 40px 20px; max-width: 1200px; margin: 0 auto; animation: scanline 0.4s ease-out; }
    .view.active { display: block; }
    @keyframes scanline { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; margin-top: 20px; }
    
    .sig-box { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; padding: 15px; position: relative; cursor: pointer; transition: all 0.2s; }
    .sig-box:hover { border-color: var(--blue-glow); box-shadow: 0 0 15px rgba(0,240,255,0.2); }
    .sig-box .name-tag { font-weight: 600; font-size: 0.95rem; color: var(--blue-glow); margin-bottom: 5px; border-bottom: 1px dashed var(--border); padding-bottom: 5px; }
    .sig-box .sub-info { font-size: 0.8rem; color: var(--dim); margin-bottom: 10px; }
    .sig-box img { width: 100%; height: 100px; background: #000; object-fit: contain; border-radius: 4px; }
    
    .add-box { background: rgba(0, 114, 255, 0.05); border: 2px dashed var(--border); border-radius: 8px; min-height: 165px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }
    .add-box:hover { border-color: var(--blue-glow); background: rgba(0, 240, 255, 0.05); }
    .add-box .plus-icon { font-size: 3rem; color: var(--dim); transition: 0.2s; }
    .add-box:hover .plus-icon { color: var(--blue-glow); transform: scale(1.1); }

    .form-container { max-width: 600px; margin: 0 auto; background: var(--panel); border: 1px solid var(--border); padding: 30px; border-radius: 8px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 0.75rem; font-family: 'Orbitron'; color: var(--dim); margin-bottom: 8px; letter-spacing: 1px; }
    .form-group input, .form-group textarea { width: 100%; background: #000; border: 1px solid var(--border); padding: 12px; color: #fff; border-radius: 4px; font-family: 'Exo 2'; }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--blue-glow); outline: none; }
    
    .canvas-area { position: relative; background: #000; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; margin-top: 5px; }
    canvas { display: block; width: 100%; height: 180px; cursor: crosshair; }
    .clear-sig-btn { position: absolute; top: 10px; right: 10px; background: rgba(255,0,85,0.2); border: 1px solid var(--danger); color: var(--danger); padding: 4px 10px; border-radius: 4px; font-size: 0.75rem; cursor: pointer; font-weight: bold; z-index: 10; }
    .clear-sig-btn:hover { background: var(--danger); color: #fff; }

    .btn { padding: 12px 24px; font-family: 'Orbitron'; font-weight: bold; border-radius: 4px; cursor: pointer; border: none; font-size: 0.85rem; }
    .btn-submit { background: var(--blue-accent); color: white; box-shadow: 0 4px 10px rgba(0,114,255,0.4); }
    .btn-submit:hover { background: #2687ff; }
    
    .error-container { text-align: center; padding-top: 60px; color: var(--danger); }
    .error-code { font-family: 'Orbitron'; font-size: 6rem; font-weight: 900; text-shadow: 0 0 20px rgba(255,0,85,0.4); }
  </style>
</head>
<body>

  <header>
    <div class="logo-main"><span class="part-1">LNX</span><span class="part-2">NHAT</span></div>
    <div class="logo-sub">SECURITY SYSTEM INTEGRATION</div>
  </header>

  <div class="timer-banner" id="lock-timer-display">
    HỆ THỐNG ĐÓNG SAU: <span id="timer-countdown">01:30</span>
  </div>

  <div id="router-wrapper">
    
    <div id="view-error" class="view">
      <div class="error-container">
        <div class="error-code">403</div>
        <h2 style="font-family:'Orbitron'">ACCESS DENIED</h2>
        <p style="margin-top:15px; color:var(--dim)" id="error-message-text">Liên kết không hợp lệ hoặc mã khóa của bạn đã hết hạn truy cập vĩnh viễn.</p>
      </div>
    </div>

    <div id="view-guest-id-create" class="view">
      <div class="form-container">
        <div class="form-group">
          <label>Mã ID tự động (Hệ thống)</label>
          <input type="text" id="g-id" readonly style="font-family:'Share Tech Mono'; color:var(--blue-glow); font-size:1.3rem;" />
        </div>
        <div class="form-group">
          <label>Họ và Tên</label>
          <input type="text" id="g-name" placeholder="Nhập tên của bạn..." />
        </div>
        <div class="form-group">
          <label>Năm sinh</label>
          <input type="number" id="g-birth" placeholder="Ví dụ: 2010" />
        </div>
        <div class="form-group">
          <label>Ghi chú</label>
          <textarea id="g-note" rows="2" placeholder="Nhập ghi chú (nếu có)..."></textarea>
        </div>
        <div class="form-group">
          <label>Bảng ký tên điện tử</label>
          <div class="canvas-area">
            <button class="clear-sig-btn" onclick="clearSignatureCanvas(event)">XÓA KÝ LẠI</button>
            <canvas id="g-canvas"></canvas>
          </div>
        </div>
        <button class="btn btn-submit" style="width:100%" onclick="handleGuestSubmit()">HOÀN THÀNH & LƯU HỆ THỐNG</button>
      </div>
    </div>

    <div id="view-guest-home" class="view">
      <div class="card-grid" id="guest-grid-container"></div>
    </div>

    <div id="view-guest-id" class="view">
      <div class="form-container" id="guest-detail-card"></div>
    </div>

    <div id="view-ad-home" class="view">
      <h2 style="font-family:'Orbitron'; color:var(--blue-glow); text-align:center; margin-bottom:20px;">ADMIN CONTROL PANEL</h2>
      <div class="card-grid">
        <div class="add-box" onclick="navigateWithRules('#/aD/create')">
          <div class="plus-icon">+</div>
          <div style="font-family:'Orbitron'; font-size:0.8rem; color:var(--dim); margin-top:5px">THÊM HỒ SƠ MỚI</div>
        </div>
        <div id="ad-grid-container" style="display:contents;"></div>
      </div>
    </div>

    <div id="view-ad-id" class="view">
      <div class="form-container" id="ad-detail-card"></div>
    </div>

    <div id="view-ad-create" class="view">
      <h2 style="font-family:'Orbitron'; color:var(--blue-glow); text-align:center; margin-bottom:20px;">ADMIN CREATE</h2>
      <div class="form-container">
        <div class="form-group">
          <label>Mã ID Hệ thống</label>
          <input type="text" id="ad-id" readonly style="font-family:'Share Tech Mono'; color:var(--blue-glow);" />
        </div>
        <div class="form-group">
          <label>Tên biểu mẫu / Nhân sự</label>
          <input type="text" id="ad-name" placeholder="Nhập định danh..." />
        </div>
        <button class="btn btn-submit" style="width:100%" onclick="handleAdminSubmit()">XÁC NHẬN TẠO HỒ SƠ</button>
      </div>
    </div>

  </div>

  <script>
    let localDatabase = [
      { id: "0001", name: "Nguyễn Văn A", birth: "2010", note: "Học sinh lớp 8", sig: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAKAAAABaCAYAAAA" },
      { id: "0002", name: "Trần Thị B", birth: "2011", note: "Thành viên ban sự kiện", sig: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAKAAAABaCAYAAAA" }
    ];

    let currentSelectedId = ""; 
    let globalTimerInterval = null;

    // --- BỘ ĐIỀU HƯỚNG PHÂN QUYỀN CHÌA KHÓA BẢO MẬT LUỒNG WEB ---
    function navigateWithRules(targetHash) {
      // Chuẩn hóa hash
      if (!targetHash.startsWith('#/')) {
        targetHash = targetHash.replace('#', '#/');
      }
      
      const cur = (location.hash || '#/').replace('#/', '').replace('#', '');
      const tar = targetHash.replace('#/', '').replace('#', '');

      // Kiểm tra trạng thái khóa của Guest trên thiết bị
      if (localStorage.getItem('lnxnhat_locked') === 'true' && (tar.startsWith('guest/home') || tar.startsWith('guest/id'))) {
        location.hash = '#/error';
        return;
      }

      // 1. Chìa khóa bảo mật chủ nhà: #/aD (a thường, D hoa) -> vào thẳng hệ thống vô hạn
      if (tar === 'aD' || tar === 'aD/home') {
        location.hash = '#/aD/home';
        return;
      }
      if (tar.startsWith('aD/')) {
        location.hash = targetHash;
        return;
      }

      // 2. Chìa khóa Guest: #/guest -> đá thẳng sang trang nhập liệu để xác minh
      if (tar === 'guest') {
        location.hash = '#/guest/id/create';
        return;
      }

      // 3. Cho phép truy cập Form nhập liệu tự do
      if (tar === 'guest/id/create') {
        location.hash = targetHash;
        return;
      }

      // 4. Kiểm tra quyền vào guest/home (Chỉ cho phép khi ổ khóa 1p30s đang kích hoạt mở)
      if (tar === 'guest/home' || (tar.startsWith('guest/id') && !tar.endsWith('/create'))) {
        if (localStorage.getItem('lnxnhat_timer_end') !== null && localStorage.getItem('lnxnhat_locked') !== 'true') {
          location.hash = targetHash;
        } else {
          location.hash = '#/error';
        }
        return;
      }

      // Mặc định các link không khai báo bị đá về trang lỗi
      location.hash = '#/error';
    }

    // Lắng nghe sự kiện đổi URL của trình duyệt
    window.addEventListener('hashchange', () => {
      let hash = location.hash || '#/';
      let cleanHash = hash.replace('#/', '').replace('#', '');
      
      // Chặn và điều hướng thông minh dựa trên chìa khóa gõ trên URL
      if (cleanHash === 'guest') {
        navigateWithRules('#/guest');
        return;
      }
      if (cleanHash === 'aD') {
        navigateWithRules('#/aD');
        return;
      }

      // Xử lý chặn cứng nếu thiết bị đã hết hạn
      if (localStorage.getItem('lnxnhat_locked') === 'true' && (cleanHash.startsWith('guest/home') || cleanHash.startsWith('guest/id?='))) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('view-error').classList.add('active');
        document.getElementById('lock-timer-display').style.display = 'none';
        return;
      }

      // Bật tắt view tương ứng
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));

      if (cleanHash === 'guest/id/create') {
        setupCreateForm('g-id');
        document.getElementById('view-guest-id-create').classList.add('active');
        document.getElementById('lock-timer-display').style.display = 'none';
        setTimeout(initSignatureCanvas, 50);
      }
      else if (cleanHash === 'guest/home') {
        renderGridContainer('guest-grid-container', false);
        document.getElementById('view-guest-home').classList.add('active');
        startLockCountdown();
      }
      else if (cleanHash.startsWith('guest/id') && !cleanHash.endsWith('/create')) {
        const idParam = cleanHash.split('?=')[1];
        extractDetailRecord(idParam, 'guest-detail-card', false);
        document.getElementById('view-guest-id').classList.add('active');
        startLockCountdown();
      }
      else if (cleanHash === 'aD/home') {
        renderGridContainer('ad-grid-container', true);
        document.getElementById('view-ad-home').classList.add('active');
        document.getElementById('lock-timer-display').style.display = 'none';
      }
      else if (cleanHash.startsWith('aD/id')) {
        const idParam = cleanHash.split('?=')[1];
        extractDetailRecord(idParam, 'ad-detail-card', true);
        document.getElementById('view-ad-id').classList.add('active');
        document.getElementById('lock-timer-display').style.display = 'none';
      }
      else if (cleanHash === 'aD/create') {
        setupCreateForm('ad-id');
        document.getElementById('view-ad-create').classList.add('active');
        document.getElementById('lock-timer-display').style.display = 'none';
      }
      else {
        document.getElementById('view-error').classList.add('active');
        document.getElementById('lock-timer-display').style.display = 'none';
      }
    });

    // --- BỘ ĐẾM NGƯỢC THỜI GIAN THỰC (REALTIME LOCK) ---
    function startLockCountdown() {
      if (globalTimerInterval) clearInterval(globalTimerInterval);
      
      const timerEndStr = localStorage.getItem('lnxnhat_timer_end');
      if (!timerEndStr) return;

      const timerEnd = parseInt(timerEndStr, 10);
      const displayBanner = document.getElementById('lock-timer-display');
      const displaySpan = document.getElementById('timer-countdown');
      
      displayBanner.style.display = 'block';

      globalTimerInterval = setInterval(() => {
        const now = Date.now();
        const timeLeft = timerEnd - now;

        if (timeLeft <= 0) {
          clearInterval(globalTimerInterval);
          localStorage.setItem('lnxnhat_locked', 'true');
          displayBanner.style.display = 'none';
          location.hash = '#/error';
        } else {
          const totalSeconds = Math.floor(timeLeft / 1000);
          const minutes = Math.floor(totalSeconds / 60);
          const seconds = totalSeconds % 60;
          displaySpan.innerText = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }
      }, 250);
    }

    function setupCreateForm(inputFieldId) {
      let nextNum = localDatabase.length + 1;
      let generatedId = String(nextNum).padStart(4, '0');
      const field = document.getElementById(inputFieldId);
      if (field) field.value = generatedId;
    }

    function renderGridContainer(containerId, isAdmin) {
      const container = document.getElementById(containerId);
      if (!container) return;
      container.innerHTML = "";
      
      localDatabase.forEach(item => {
        const box = document.createElement('div');
        box.className = "sig-box";
        box.onclick = () => {
          navigateWithRules(isAdmin ? `#aD/id?=${item.id}` : `#guest/id?=${item.id}`);
        };
        
        box.innerHTML = `
          <div class="name-tag">${item.name} (ID: ${item.id})</div>
          <div class="sub-info">Năm sinh: ${item.birth || 'N/A'}</div>
          <img src="${item.sig.startsWith('data:') ? item.sig : 'data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'100\' height=\'40\'><text x=\'10\' y=\'25\' fill=\'%23555\'>Chữ ký rỗng</text></svg>'}" />
        `;
        container.appendChild(box);
      });
    }

    function extractDetailRecord(idParam, containerId, isAdmin) {
      const target = localDatabase.find(i => i.id === idParam);
      const container = document.getElementById(containerId);
      if (!container) return;
      
      if (!target) {
        container.innerHTML = `<p style="color:var(--danger)">Hồ sơ không tồn tại.</p>`;
        return;
      }
      
      container.innerHTML = `
        <h3 style="color:var(--blue-glow); margin-bottom:15px; font-family:'Orbitron'; text-align:center;">HỒ SƠ MÃ SỐ: ${target.id}</h3>
        <p style="margin-bottom:10px;"><b>Họ tên nhân sự:</b> ${target.name}</p>
        <p style="margin-bottom:10px;"><b>Năm sinh:</b> ${target.birth || 'Không rõ'}</p>
        <p style="margin-bottom:15px;"><b>Ghi chú nội bộ:</b> ${target.note || 'Trống'}</p>
        <p style="margin-bottom:5px;"><b>Hình ảnh chữ ký xác thực:</b></p>
        <div style="background:#000; padding:15px; border-radius:4px; border:1px solid var(--border)">
          <img src="${target.sig}" style="max-width:100%; height:auto;" />
        </div>
        <div style="display:flex; gap:10px; margin-top:20px;">
          <button class="btn btn-submit" style="flex:1" onclick="navigateWithRules('${isAdmin ? '#aD/home' : '#guest/home'}')">QUAY LẠI DANH SÁCH</button>
        </div>
      `;
    }

    let canvas, ctx, drawing = false;
    function initSignatureCanvas() {
      canvas = document.getElementById('g-canvas'); if (!canvas) return;
      ctx = canvas.getContext('2d');
      canvas.width = canvas.parentElement.clientWidth; canvas.height = 180;
      ctx.fillStyle = '#000000'; ctx.fillRect(0, 0, canvas.width, 180);
      ctx.strokeStyle = '#00ff66'; ctx.lineWidth = 3; ctx.lineCap = 'round';

      const getPos = (e) => {
        const r = canvas.getBoundingClientRect();
        return { x: (e.clientX || e.touches[0].clientX) - r.left, y: (e.clientY || e.touches[0].clientY) - r.top };
      };
      canvas.onmousedown = (e) => { drawing = true; ctx.beginPath(); let p = getPos(e); ctx.moveTo(p.x, p.y); };
      canvas.onmousemove = (e) => { if(!drawing) return; let p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
      canvas.onmouseup = () => drawing = false;
      canvas.ontouchstart = (e) => { drawing = true; ctx.beginPath(); let p = getPos(e); ctx.moveTo(p.x, p.y); };
      canvas.ontouchmove = (e) => { if(!drawing) return; let p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
      canvas.ontouchend = () => drawing = false;
    }
    
    function clearSignatureCanvas(event) { 
      if(event) event.stopPropagation();
      if(ctx && canvas) { ctx.fillStyle = '#000000'; ctx.fillRect(0, 0, canvas.width, 180); } 
    }

    // --- LƯU HỒ SƠ & BẮT ĐẦU ĐẾM NGƯỢC THỜI GIAN KHÓA ---
    function handleGuestSubmit() {
      const id = document.getElementById('g-id').value;
      const name = document.getElementById('g-name').value.trim();
      const birth = document.getElementById('g-birth').value.trim();
      const note = document.getElementById('g-note').value.trim();
      const sigData = canvas ? canvas.toDataURL() : "";

      if (!name) { alert("Vui lòng nhập họ tên!"); return; }

      // Bắn data lên Google Form ngầm
      const formUrl = "https://docs.google.com/forms/u/0/d/e/1FAIpQLSdN-r671XTq3CPWkldA1E_6u1IckFsG-_URc8YSUEHNKLKppg/formResponse";
      const formData = new FormData();
      formData.append("entry.804035975", id);
      formData.append("entry.1227843883", name);
      formData.append("entry.919040770", sigData); 
      fetch(formUrl, { method: "POST", body: formData, mode: "no-cors" }).catch(err => console.error(err));

      localDatabase.push({ id: id, name: name, birth: birth, note: note, sig: sigData });

      // KÍCH HOẠT Ổ KHÓA 1 PHÚT 30 GIÂY HỆ THỐNG GUEST
      const duration = 1 * 60 * 1000 + 30 * 1000; 
      localStorage.setItem('lnxnhat_timer_end', (Date.now() + duration).toString());
      localStorage.setItem('lnxnhat_locked', 'false');

      // Reset form nhập liệu
      document.getElementById('g-name').value = "";
      document.getElementById('g-birth').value = "";
      document.getElementById('g-note').value = "";
      clearSignatureCanvas();

      // Chuyển hướng thẳng sang trang danh sách của khách
      location.hash = '#/guest/home';
    }

    function handleAdminSubmit() {
      const id = document.getElementById('ad-id').value;
      const name = document.getElementById('ad-name').value.trim();
      if (!name) { alert("Vui lòng điền tên mẫu!"); return; }
      localDatabase.push({ id: id, name: name, birth: "", note: "Admin Entry", sig: "" });
      document.getElementById('ad-name').value = "";
      location.hash = '#/aD/home';
    }

    // Tự động kiểm tra trạng thái đếm ngược khi khởi chạy trang
    // Tự động kiểm tra trạng thái đếm ngược và bắt chính xác mã chìa khóa khi khởi chạy trang
    window.onload = () => {
      if (localStorage.getItem('lnxnhat_timer_end')) {
        startLockCountdown();
      }
      
      // Lấy chính xác những gì người dùng gõ trên thanh địa chỉ khi vừa bấm Enter vào web
      let initialHash = (location.hash || '#/').replace('#/', '').replace('#', '');
      
      // Nếu gõ đúng chìa khóa bảo mật chủ nhà, mở cửa vào thẳng ad/home ngay từ lúc tải trang
      if (initialHash === 'aD') {
        location.hash = '#/aD/home';
      } else {
        // Kích hoạt lõi định tuyến router để cập nhật giao diện
        window.dispatchEvent(new HashChangeEvent('hashchange'));
      }
    };
  </script>
</body>
</html>
