<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>LNXNhat System — Core</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --black: #000000; --dark: #050811; --panel: #0a1128;
      --border: #12357a; --blue-glow: #00f0ff; --blue-accent: #0072ff;
      --white: #eaf2ff; --dim: #708cb6; --success: #00ff66; --danger: #ff0055;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--black); color: var(--white); font-family: 'Exo 2', sans-serif; min-height: 100vh; overflow-x: hidden; }
    body::before { content: ''; position: fixed; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,240,255,0.02) 2px, rgba(0,240,255,0.02) 4px); pointer-events: none; z-index: 9999; }

    /* ── Topbar (fixed) ── */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 5000;
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 20px; gap: 14px;
      background: rgba(5,8,17,0.94);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px);
    }
    body { padding-top: 56px; }
    .logo-main { font-family: 'Orbitron', sans-serif; font-size: 1.05rem; font-weight: 900; letter-spacing: 4px; white-space: nowrap; flex-shrink: 0; }
    .logo-main .part-1 { color: var(--blue-glow); text-shadow: 0 0 12px rgba(0,240,255,0.7); }
    .logo-main .part-2 { color: var(--white); }
    /* Search in topbar */
    .search-wrap { flex: 1; max-width: 340px; position: relative; }
    .search-wrap input {
      width: 100%; background: rgba(0,0,0,0.6); border: 1px solid var(--border);
      color: var(--white); padding: 7px 12px 7px 32px;
      border-radius: 4px; font-family: 'Exo 2'; font-size: 0.88rem;
      transition: border-color 0.2s;
    }
    .search-wrap input:focus { border-color: var(--blue-glow); outline: none; }
    .search-wrap input::placeholder { color: var(--dim); }
    .search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--dim); font-size: 0.82rem; pointer-events: none; }

    /* ── Timer ── */
    .timer-banner { background: rgba(0,240,255,0.05); border: 1px solid var(--blue-glow); color: var(--blue-glow); font-family: 'Orbitron', sans-serif; padding: 10px; text-align: center; border-radius: 6px; max-width: 300px; margin: 10px auto; font-weight: bold; display: none; box-shadow: 0 0 12px rgba(0,240,255,0.2); letter-spacing: 1px; font-size: 0.9rem; }

    /* ── Views ── */
    .view { display: none; padding: 20px; max-width: 1200px; margin: 0 auto; animation: scanline 0.3s ease-out; }
    .view.active { display: block; }
    @keyframes scanline { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Cards ── */
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; margin-top: 20px; }
    .sig-box { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; padding: 15px; position: relative; cursor: pointer; transition: all 0.2s; }
    .sig-box:hover { border-color: var(--blue-glow); box-shadow: 0 0 15px rgba(0,240,255,0.2); }
    .sig-box .name-tag { font-weight: 600; font-size: 0.95rem; color: var(--blue-glow); margin-bottom: 5px; border-bottom: 1px dashed var(--border); padding-bottom: 5px; }
    .sig-box .sub-info { font-size: 0.8rem; color: var(--dim); margin-bottom: 5px; }
    .sig-box img { width: 100%; height: 100px; background: #000; object-fit: contain; border-radius: 4px; margin-top: 5px; }
    .add-box { background: rgba(0,114,255,0.05); border: 2px dashed var(--border); border-radius: 8px; min-height: 165px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }
    .add-box:hover { border-color: var(--blue-glow); background: rgba(0,240,255,0.05); }
    .add-box .plus-icon { font-size: 3rem; color: var(--dim); transition: 0.2s; }
    .add-box:hover .plus-icon { color: var(--blue-glow); transform: scale(1.1); }

    /* ── Form ── */
    .form-container { max-width: 600px; margin: 0 auto; background: var(--panel); border: 1px solid var(--border); padding: 25px; border-radius: 8px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 0.75rem; font-family: 'Orbitron'; color: var(--dim); margin-bottom: 6px; letter-spacing: 1px; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; background: #000; border: 1px solid var(--border); padding: 10px; color: #fff; border-radius: 4px; font-family: 'Exo 2'; }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--blue-glow); outline: none; }

    /* ── Canvas ── */
    .canvas-area { position: relative; background: #000; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; margin-bottom: 5px; }
    canvas { display: block; width: 100%; height: 180px; cursor: crosshair; touch-action: none; }
    .canvas-controls { position: absolute; top: 10px; right: 10px; display: flex; gap: 8px; z-index: 10; }
    .control-btn { background: rgba(255,255,255,0.1); border: 1px solid var(--dim); color: var(--white); padding: 4px 12px; border-radius: 4px; font-size: 0.75rem; cursor: pointer; font-weight: bold; }
    .clear-sig-btn { border-color: var(--danger); color: var(--danger); }
    .clear-sig-btn:hover { background: var(--danger); color: #fff; }

    /* ── Buttons ── */
    .btn { padding: 10px 20px; font-family: 'Orbitron'; font-weight: bold; border-radius: 4px; cursor: pointer; border: none; font-size: 0.8rem; letter-spacing: 1px; text-transform: uppercase; transition: opacity 0.2s; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-submit { background: var(--blue-accent); color: white; }
    .btn-secondary { background: #1c2638; color: var(--white); border: 1px solid var(--border); }
    .btn-danger { background: rgba(255,0,85,0.1); color: var(--danger); border: 1px solid var(--danger); }

    /* ── Misc ── */
    .error-container { text-align: center; padding-top: 60px; color: var(--danger); }
    .error-code { font-family: 'Orbitron'; font-size: 5rem; font-weight: 900; }
    .tag-badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.7rem; font-weight: bold; color: #fff; margin-bottom: 5px; border: 1px solid rgba(255,255,255,0.2); }
    .filters-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .filters-bar select { background: var(--dark); border: 1px solid var(--border); color: var(--white); padding: 8px; border-radius: 4px; flex: 1; }

    /* ── Fullscreen modal ── */
    .fullscreen-modal { display: none; position: fixed; inset: 0; background: #000; z-index: 10000; flex-direction: column; padding: 20px; }
    .fullscreen-modal.active { display: flex; }
    .fullscreen-canvas-wrapper { flex: 1; border: 2px dashed var(--border); border-radius: 8px; overflow: hidden; position: relative; margin: 15px 0; }
    .fullscreen-canvas-wrapper canvas { width: 100%; height: 100%; }

    /* ══════════════════════════════════════
       TOAST NOTIFICATION
    ══════════════════════════════════════ */
    #toast-container {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      pointer-events: none;
    }
    .toast {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.78rem;
      letter-spacing: 1px;
      padding: 12px 24px;
      border-radius: 6px;
      border: 1px solid;
      min-width: 240px;
      text-align: center;
      animation: toastIn 0.3s ease, toastOut 0.4s ease 2.6s forwards;
      pointer-events: none;
    }
    .toast.success {
      background: rgba(0, 255, 102, 0.1);
      border-color: var(--success);
      color: var(--success);
      box-shadow: 0 0 16px rgba(0,255,102,0.25);
    }
    .toast.error {
      background: rgba(255, 0, 85, 0.1);
      border-color: var(--danger);
      color: var(--danger);
      box-shadow: 0 0 16px rgba(255,0,85,0.25);
    }
    .toast.loading {
      background: rgba(0, 114, 255, 0.1);
      border-color: var(--blue-glow);
      color: var(--blue-glow);
      box-shadow: 0 0 16px rgba(0,240,255,0.2);
      animation: toastIn 0.3s ease;
    }
    @keyframes toastIn  { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes toastOut { from { opacity:1; } to   { opacity:0; transform:translateY(8px); } }
  </style>
</head>
<body>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- Fixed topbar -->
  <div class="topbar">
    <div class="logo-main"><span class="part-1">LNX</span><span class="part-2">NHAT</span></div>
    <div id="search-wrap-el" class="search-wrap" style="display:none;">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Tìm kiếm tên..." oninput="handleSearch()" autocomplete="off" />
    </div>
  </div>

  <div class="timer-banner" id="lock-timer-display">
    THỜI GIAN TRUY CẬP: <span id="timer-countdown">01:30</span>
  </div>

  <div id="router-wrapper">

    <!-- ERROR -->
    <div id="view-error" class="view">
      <div class="error-container">
        <div class="error-code">403</div>
        <h2 style="font-family:'Orbitron'; font-size:1.3rem;">ACCESS DENIED</h2>
      </div>
    </div>

    <!-- GUEST FORM -->
    <div id="view-guest-id-create" class="view">
      <div class="form-container">
        <h3 style="color:var(--blue-glow); text-align:center; margin-bottom:15px; font-family:'Orbitron';">XÁC MINH DANH TÍNH</h3>
        <div class="form-group"><label>Họ và Tên</label><input type="text" id="g-name" /></div>
        <div class="form-group">
          <label>Lớp (vd: 8/5, 11A2, 11/2)</label>
          <input type="text" id="g-class" placeholder="Nhập lớp..." autocomplete="off" />
        </div>
        <div class="form-group"><label>Ngày sinh</label><input type="date" id="g-birth" /></div>
        <div class="form-group"><label>Ghi chú</label><textarea id="g-note" rows="2"></textarea></div>
        <div class="form-group">
          <label>Chữ ký</label>
          <div class="canvas-area">
            <div class="canvas-controls">
              <button class="control-btn" onclick="openFullscreenSignature('g-canvas')">MỞ RỘNG</button>
              <button class="control-btn clear-sig-btn" onclick="clearSignatureCanvas('g-canvas')">XÓA</button>
            </div>
            <canvas id="g-canvas"></canvas>
          </div>
        </div>
        <button id="btn-guest-submit" class="btn btn-submit" style="width:100%" onclick="handleGuestSubmit()">
          HOÀN THÀNH &amp; MỞ KHÓA
        </button>
      </div>
    </div>

    <!-- GUEST HOME -->
    <div id="view-guest-home" class="view"><div class="card-grid" id="guest-grid-container"></div></div>

    <!-- GUEST DETAIL -->
    <div id="view-guest-id" class="view"><div class="form-container" id="guest-detail-card"></div></div>

    <!-- ADMIN HOME -->
    <div id="view-ad-home" class="view">
      <div class="filters-bar">
        <select id="filter-class" onchange="renderGridContainer('ad-grid-container', true)">
          <option value="ALL">-- Tất cả Lớp --</option>
        </select>
        <select id="filter-tag" onchange="renderGridContainer('ad-grid-container', true)">
          <option value="ALL">-- Tất cả Mối quan hệ --</option>
        </select>
        <button class="btn btn-secondary" onclick="location.hash='#/aD/tags'">QUẢN LÝ TAGS</button>
      </div>
      <div class="card-grid">
        <div class="add-box" onclick="location.hash='#/aD/create'">
          <div class="plus-icon">+</div>
          <div style="font-family:'Orbitron'; font-size:0.75rem; color:var(--dim); margin-top:5px">THÊM HỒ SƠ</div>
        </div>
        <div id="ad-grid-container" style="display:contents;"></div>
      </div>
    </div>

    <!-- ADMIN TAGS -->
    <div id="view-ad-tags" class="view">
      <div class="form-container">
        <h3 style="color:var(--blue-glow); margin-bottom:20px; text-align:center; font-family:'Orbitron';">TẠO MỐI QUAN HỆ</h3>
        <div class="form-group"><label>Tên Tag</label><input type="text" id="tag-name" /></div>
        <div class="form-group"><label>Màu nền Tag</label><input type="color" id="tag-color" style="height:40px; padding:2px;" /></div>
        <div style="display:flex; gap:10px;">
          <button class="btn btn-secondary" style="flex:1" onclick="location.hash='#/aD/home'">QUAY LẠI</button>
          <button id="btn-tag-submit" class="btn btn-submit" style="flex:2" onclick="handleCreateTag()">TẠO TAG</button>
        </div>
      </div>
    </div>

    <!-- ADMIN DETAIL -->
    <div id="view-ad-id" class="view"><div class="form-container" id="ad-detail-card"></div></div>

    <!-- ADMIN CREATE — KHÔNG có Mối quan hệ, thêm ở màn Sửa -->
    <div id="view-ad-create" class="view">
      <div class="form-container">
        <h3 style="color:var(--blue-glow); margin-bottom:20px; text-align:center; font-family:'Orbitron';">TẠO HỒ SƠ</h3>
        <div class="form-group"><label>Họ và Tên</label><input type="text" id="ad-name" /></div>
        <div class="form-group">
          <label>Lớp (vd: 8/5, 11A2, 11/2)</label>
          <input type="text" id="ad-class" placeholder="Nhập lớp..." autocomplete="off" />
        </div>
        <div class="form-group"><label>Ngày sinh</label><input type="date" id="ad-birth" /></div>
        <div class="form-group"><label>Ghi chú</label><textarea id="ad-note" rows="2"></textarea></div>
        <div class="form-group">
          <label>Chữ ký</label>
          <div class="canvas-area">
            <div class="canvas-controls">
              <button class="control-btn" onclick="openFullscreenSignature('ad-canvas')">MỞ RỘNG</button>
              <button class="control-btn clear-sig-btn" onclick="clearSignatureCanvas('ad-canvas')">XÓA</button>
            </div>
            <canvas id="ad-canvas"></canvas>
          </div>
        </div>
        <div style="display:flex; gap:10px;">
          <button class="btn btn-secondary" style="flex:1" onclick="location.hash='#/aD/home'">HỦY</button>
          <button id="btn-ad-submit" class="btn btn-submit" style="flex:2" onclick="handleAdminSubmit()">LƯU HỒ SƠ</button>
        </div>
      </div>
    </div>

    <!-- ADMIN EDIT — CÓ Mối quan hệ -->
    <div id="view-ad-edit" class="view">
      <div class="form-container">
        <h3 style="color:var(--blue-glow); margin-bottom:20px; text-align:center; font-family:'Orbitron';">CHỈNH SỬA HỒ SƠ</h3>
        <input type="hidden" id="edit-id" />
        <div class="form-group"><label>Họ và Tên</label><input type="text" id="edit-name" /></div>
        <div class="form-group">
          <label>Lớp (vd: 8/5, 11A2, 11/2)</label>
          <input type="text" id="edit-class" placeholder="Nhập lớp..." autocomplete="off" />
        </div>
        <div class="form-group"><label>Ngày sinh</label><input type="date" id="edit-birth" /></div>
        <div class="form-group"><label>Mối quan hệ</label><select id="edit-relId"></select></div>
        <div class="form-group"><label>Ghi chú</label><textarea id="edit-note" rows="3"></textarea></div>
        <div style="display:flex; gap:10px; margin-top:20px;">
          <button class="btn btn-secondary" style="flex:1" onclick="location.hash='#/aD/home'">HỦY BỎ</button>
          <button id="btn-edit-submit" class="btn btn-submit" style="flex:2" onclick="saveAdminEditChanges()">LƯU THAY ĐỔI</button>
        </div>
      </div>
    </div>

  </div><!-- /router-wrapper -->

  <!-- FULLSCREEN SIGNATURE MODAL -->
  <div id="signature-modal-view" class="fullscreen-modal">
    <div style="display:flex; justify-content:space-between; font-family:'Orbitron'; color:var(--blue-glow); font-size:1rem;">
      <span>KÝ TOÀN MÀN HÌNH</span>
    </div>
    <div class="fullscreen-canvas-wrapper"><canvas id="fs-canvas"></canvas></div>
    <div style="display:flex; gap:15px;">
      <button class="btn btn-secondary" onclick="closeFullscreenSignature(false)">HỦY</button>
      <button class="btn btn-danger" onclick="clearSignatureCanvas('fs-canvas')">XÓA SẠCH</button>
      <button class="btn btn-submit" style="flex:1;" onclick="closeFullscreenSignature(true)">HOÀN THÀNH</button>
    </div>
  </div>

  <script src="backup.js"></script>
  <script>
    let globalTimerInterval = null;
    let canvases = {}, ctxs = {}, drawing = {};
    let activeCanvasSrc = null;

    // ══════════════════════════════════════
    // TOAST SYSTEM
    // ══════════════════════════════════════
    let _loadingToast = null;

    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      el.textContent = message;
      container.appendChild(el);
      if (type !== 'loading') {
        setTimeout(() => el.remove(), 3000);
      }
      return el;
    }

    function showLoading(btnId, loadingText = '⏳ ĐANG GỬI...') {
      // Hiện toast loading + disable nút
      _loadingToast = showToast(loadingText, 'loading');
      const btn = document.getElementById(btnId);
      if (btn) { btn.disabled = true; btn._origText = btn.textContent; btn.textContent = loadingText; }
      return btn;
    }

    function hideLoading(btnId, result) {
      // Xóa toast loading
      if (_loadingToast) { _loadingToast.remove(); _loadingToast = null; }
      const btn = document.getElementById(btnId);
      if (btn) { btn.disabled = false; btn.textContent = btn._origText || btn.textContent; }
      // Hiện kết quả
      if (result && result.success) {
        showToast('✅ ĐÃ LƯU THÀNH CÔNG!', 'success');
      } else if (result) {
        showToast('❌ LỖI: ' + (result.error || 'Không gửi được'), 'error');
      }
    }

    // ══════════════════════════════════════
    // TAG & DROPDOWN
    // ══════════════════════════════════════
    function getTagInfo(relId) {
      return window.tagsDatabase.find(t => t.tagId === relId) || null;
    }

    function populateTagDropdowns() {
      if (!window.tagsDatabase) window.tagsDatabase = [];
      if (!window.localDatabase) window.localDatabase = [];

      const tagOpts    = `<option value="">-- Không có --</option>` + window.tagsDatabase.map(t => `<option value="${t.tagId}">${t.tagName}</option>`).join('');
      const filterOpts = `<option value="ALL">-- Tất cả Mối quan hệ --</option>` + window.tagsDatabase.map(t => `<option value="${t.tagId}">${t.tagName}</option>`).join('');

      if (document.getElementById('edit-relId')) document.getElementById('edit-relId').innerHTML = tagOpts;
      if (document.getElementById('filter-tag')) document.getElementById('filter-tag').innerHTML = filterOpts;

      const classes = [...new Set(window.localDatabase.map(i => i.class).filter(c => c))];
      const classOpts = `<option value="ALL">-- Tất cả Lớp --</option>` + classes.map(c => `<option value="${c}">${c}</option>`).join('');
      if (document.getElementById('filter-class')) document.getElementById('filter-class').innerHTML = classOpts;
    }

    window.refreshUI = function() {
      populateTagDropdowns();
      if (location.hash.includes('aD/home'))    renderGridContainer('ad-grid-container', true);
      if (location.hash.includes('guest/home')) renderGridContainer('guest-grid-container', false);
    };

    // ══════════════════════════════════════
    // SEARCH HANDLER
    // ══════════════════════════════════════
    function handleSearch() {
      const h = location.hash;
      if (h.includes('aD/home'))    renderGridContainer('ad-grid-container', true);
      if (h.includes('guest/home')) renderGridContainer('guest-grid-container', false);
    }

    // ══════════════════════════════════════
    // GRID RENDER (có lọc tìm kiếm tên)
    // ══════════════════════════════════════
    function renderGridContainer(containerId, isAdmin) {
      const container = document.getElementById(containerId);
      if (!container) return;
      container.innerHTML = '';
      let data = window.localDatabase || [];

      // Lọc theo dropdown
      if (isAdmin) {
        const fc = document.getElementById('filter-class').value;
        const ft = document.getElementById('filter-tag').value;
        if (fc !== 'ALL') data = data.filter(i => i.class === fc);
        if (ft !== 'ALL') data = data.filter(i => i.relId === ft);
      }

      // Lọc theo ô tìm kiếm tên
      const searchEl = document.getElementById('search-input');
      const keyword  = searchEl ? searchEl.value.trim().toLowerCase() : '';
      if (keyword) data = data.filter(i => i.name.toLowerCase().includes(keyword));

      if (data.length === 0) {
        container.innerHTML = `<p style="color:var(--dim); font-family:'Orbitron'; font-size:0.8rem; grid-column:1/-1; padding:20px 0;">
          ${keyword ? '🔍 Không tìm thấy "' + keyword + '"' : 'Chưa có hồ sơ nào.'}
        </p>`;
        return;
      }

      data.forEach(item => {
        const box = document.createElement('div');
        box.className = 'sig-box';
        box.onclick = () => { location.hash = isAdmin ? `#/aD/id?=${item.id}` : `#/guest/id?=${item.id}`; };
        const tag = getTagInfo(item.relId);
        const tagHtml = tag ? `<div class="tag-badge" style="background:${tag.tagColor}">${tag.tagName}</div>` : '';
        // Highlight tên khớp với keyword
        const displayName = keyword
          ? item.name.replace(new RegExp(`(${keyword})`, 'gi'), '<mark style="background:rgba(0,240,255,0.25);color:var(--blue-glow);">$1</mark>')
          : item.name;
        box.innerHTML = `
          <div class="name-tag">${displayName}</div>
          ${tagHtml}
          <div class="sub-info">ID: ${item.id} | Lớp: ${item.class || 'N/A'}</div>
          <img src="${item.sig || ''}" />
        `;
        container.appendChild(box);
      });
    }

    // ══════════════════════════════════════
    // CANVAS CHỮ KÝ — mực trắng
    // ══════════════════════════════════════
    function initSignatureCanvas(canvasId) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      canvases[canvasId] = canvas; ctxs[canvasId] = ctx; drawing[canvasId] = false;

      canvas.width  = canvas.parentElement.clientWidth;
      canvas.height = canvasId === 'fs-canvas' ? canvas.parentElement.clientHeight : 180;

      ctx.fillStyle   = '#000000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = '#ffffff';   /* ← MỰC TRẮNG */
      ctx.lineWidth   = canvasId === 'fs-canvas' ? 4 : 3;
      ctx.lineCap     = 'round';

      const getPos = e => {
        const r = canvas.getBoundingClientRect();
        const src = e.touches ? e.touches[0] : e;
        return { x: src.clientX - r.left, y: src.clientY - r.top };
      };

      canvas.onmousedown = e => { drawing[canvasId] = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); };
      canvas.onmousemove = e => { if (!drawing[canvasId]) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
      canvas.onmouseup   = () => drawing[canvasId] = false;
      canvas.onmouseleave= () => drawing[canvasId] = false;

      canvas.addEventListener('touchstart', e => { e.preventDefault(); drawing[canvasId] = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); }, { passive: false });
      canvas.addEventListener('touchmove',  e => { e.preventDefault(); if (!drawing[canvasId]) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); }, { passive: false });
      canvas.addEventListener('touchend',   () => drawing[canvasId] = false);
    }

    function clearSignatureCanvas(canvasId) {
      const c = canvases[canvasId], x = ctxs[canvasId];
      if (c && x) { x.fillStyle = '#000000'; x.fillRect(0, 0, c.width, c.height); }
    }

    function openFullscreenSignature(sourceId) {
      activeCanvasSrc = sourceId;
      document.getElementById('signature-modal-view').classList.add('active');
      initSignatureCanvas('fs-canvas');
      const src = canvases[sourceId];
      if (src) ctxs['fs-canvas'].drawImage(src, 0, 0, canvases['fs-canvas'].width, canvases['fs-canvas'].height);
    }

    function closeFullscreenSignature(shouldSave) {
      if (shouldSave && activeCanvasSrc && canvases['fs-canvas'])
        ctxs[activeCanvasSrc].drawImage(canvases['fs-canvas'], 0, 0, canvases[activeCanvasSrc].width, canvases[activeCanvasSrc].height);
      document.getElementById('signature-modal-view').classList.remove('active');
    }

    // ══════════════════════════════════════
    // SUBMIT HANDLERS — loading + toast
    // ══════════════════════════════════════
    async function handleGuestSubmit() {
      const payload = {
        action: 'ADD_RECORD',
        id:     generateID(5),
        name:   document.getElementById('g-name').value.trim(),
        class:  document.getElementById('g-class').value.trim(),
        birth:  document.getElementById('g-birth').value,
        note:   document.getElementById('g-note').value.trim(),
        sig:    canvases['g-canvas'] ? canvases['g-canvas'].toDataURL() : '',
        status: '', relId: ''
      };
      if (!payload.name) { showToast('⚠️ Vui lòng nhập họ tên!', 'error'); return; }

      showLoading('btn-guest-submit');
      const result = await sendToDrive(payload);
      hideLoading('btn-guest-submit', result);

      if (result.success) {
        localStorage.setItem('lnxnhat_timer_end', (Date.now() + 90000).toString());
        localStorage.setItem('lnxnhat_locked', 'false');
        sessionStorage.setItem('guest_completed', 'true');
        setTimeout(() => { location.hash = '#/guest/home'; }, 1200);
      }
    }

    async function handleAdminSubmit() {
      const payload = {
        action: 'ADD_RECORD',
        id:     generateID(5),
        name:   document.getElementById('ad-name').value.trim(),
        class:  document.getElementById('ad-class').value.trim(),
        birth:  document.getElementById('ad-birth').value,
        note:   document.getElementById('ad-note').value.trim(),
        sig:    canvases['ad-canvas'] ? canvases['ad-canvas'].toDataURL() : '',
        relId:  '',   /* Mối quan hệ thêm ở màn Sửa */
        status: ''
      };
      if (!payload.name) { showToast('⚠️ Vui lòng điền họ tên!', 'error'); return; }

      showLoading('btn-ad-submit');
      const result = await sendToDrive(payload);
      hideLoading('btn-ad-submit', result);

      if (result.success) setTimeout(() => { location.hash = '#/aD/home'; }, 1200);
    }

    async function saveAdminEditChanges() {
      const currentId = document.getElementById('edit-id').value;
      const orig = window.localDatabase.find(i => i.id === currentId);
      if (!orig) return;

      const nextFix = typeof window.getNextFixNumber === 'function'
        ? window.getNextFixNumber(currentId) : 1;

      const payload = {
        action: 'ADD_RECORD',
        id:     currentId,
        name:   document.getElementById('edit-name').value.trim(),
        class:  document.getElementById('edit-class').value.trim(),
        birth:  document.getElementById('edit-birth').value,
        note:   document.getElementById('edit-note').value.trim(),
        relId:  document.getElementById('edit-relId').value,
        sig:    orig.sig,
        status: 'fix' + nextFix
      };

      showLoading('btn-edit-submit');
      const result = await sendToDrive(payload);
      hideLoading('btn-edit-submit', result);

      if (result.success) setTimeout(() => { location.hash = '#/aD/home'; }, 1200);
    }

    async function deleteAdminRecord(idParam) {
      if (!confirm('Đưa hồ sơ này vào trạng thái Remove?')) return;
      const payload = { action: 'ADD_RECORD', id: idParam, status: 'remove', name:'', class:'', birth:'', note:'', sig:'', relId:'' };
      const result = await sendToDrive(payload);
      if (result.success) showToast('🗑 Đã ẩn hồ sơ', 'success');
      setTimeout(() => { location.hash = '#/aD/home'; }, 1200);
    }

    async function handleCreateTag() {
      const payload = {
        action:   'ADD_TAG',
        tagId:    generateID(3),
        tagName:  document.getElementById('tag-name').value.trim(),
        tagColor: document.getElementById('tag-color').value
      };
      if (!payload.tagName) { showToast('⚠️ Nhập tên Tag!', 'error'); return; }

      showLoading('btn-tag-submit');
      const result = await sendToDrive(payload);
      hideLoading('btn-tag-submit', result);

      if (result.success) setTimeout(() => { location.hash = '#/aD/home'; }, 1200);
    }

    // ══════════════════════════════════════
    // DETAIL RECORD
    // ══════════════════════════════════════
    function extractDetailRecord(idParam, containerId, isAdmin) {
      const target = window.localDatabase.find(i => i.id === idParam);
      const container = document.getElementById(containerId);
      if (!target) return (container.innerHTML = `<p style="color:var(--danger)">Hồ sơ không tồn tại.</p>`);

      const tag = getTagInfo(target.relId);
      const tagHtml = tag ? `<p><b>Mối quan hệ:</b> <span class="tag-badge" style="background:${tag.tagColor}">${tag.tagName}</span></p>` : '';
      let actionBtns = `<button class="btn btn-secondary" style="flex:1" onclick="location.hash='${isAdmin ? '#/aD/home' : '#/guest/home'}'">QUAY LẠI</button>`;
      if (isAdmin) actionBtns += `<button class="btn btn-submit" style="flex:1" onclick="location.hash='#/aD/edit?=${target.id}'">SỬA</button><button class="btn btn-danger" style="flex:1" onclick="deleteAdminRecord('${target.id}')">XÓA</button>`;

      container.innerHTML = `
        <h3 style="color:var(--blue-glow); margin-bottom:15px; font-family:'Orbitron'; text-align:center;">HỒ SƠ: ${target.id}</h3>
        <p><b>Họ tên:</b> ${target.name}</p>
        <p><b>Lớp:</b> ${target.class}</p>
        <p><b>Ngày sinh:</b> ${target.birth}</p>
        ${tagHtml}
        <p><b>Ghi chú:</b> ${target.note}</p>
        <p><b>Phiên bản:</b> ${target.status || 'Gốc'}</p>
        ${target.timestamp ? `<p style="color:var(--dim); font-size:0.78rem;"><b>Thời gian:</b> ${target.timestamp}</p>` : ''}
        <img src="${target.sig || ''}" style="max-width:100%; border:1px solid #333; margin-top:10px; border-radius:4px;"/>
        <div style="display:flex; gap:10px; margin-top:20px;">${actionBtns}</div>
      `;
    }

    function openAdminEditForm(idParam) {
      const t = window.localDatabase.find(i => i.id === idParam);
      if (!t) return;
      populateTagDropdowns();
      document.getElementById('edit-id').value    = t.id;
      document.getElementById('edit-name').value  = t.name;
      document.getElementById('edit-class').value = t.class;
      document.getElementById('edit-birth').value = t.birth;
      document.getElementById('edit-relId').value = t.relId || '';
      document.getElementById('edit-note').value  = t.note;
    }

    // ══════════════════════════════════════
    // RESET FORM TẠO MỚI (xóa thông tin người trước)
    // ══════════════════════════════════════
    function resetAdminCreateForm() {
      document.getElementById('ad-name').value  = '';
      document.getElementById('ad-class').value = '';
      document.getElementById('ad-birth').value = '';
      document.getElementById('ad-note').value  = '';
      // Xóa canvas chữ ký
      setTimeout(() => {
        if (canvases['ad-canvas'] && ctxs['ad-canvas']) {
          ctxs['ad-canvas'].fillStyle = '#000000';
          ctxs['ad-canvas'].fillRect(0, 0, canvases['ad-canvas'].width, canvases['ad-canvas'].height);
        }
      }, 60);
    }

    function resetGuestForm() {
      document.getElementById('g-name').value  = '';
      document.getElementById('g-class').value = '';
      document.getElementById('g-birth').value = '';
      document.getElementById('g-note').value  = '';
      setTimeout(() => {
        if (canvases['g-canvas'] && ctxs['g-canvas']) {
          ctxs['g-canvas'].fillStyle = '#000000';
          ctxs['g-canvas'].fillRect(0, 0, canvases['g-canvas'].width, canvases['g-canvas'].height);
        }
      }, 60);
    }

    // ══════════════════════════════════════
    // TIMER
    // ══════════════════════════════════════
    function startLockCountdown() {
      if (globalTimerInterval) clearInterval(globalTimerInterval);
      const timerEnd = parseInt(localStorage.getItem('lnxnhat_timer_end') || 0);
      globalTimerInterval = setInterval(() => {
        const left = timerEnd - Date.now();
        if (left <= 0) {
          clearInterval(globalTimerInterval);
          localStorage.setItem('lnxnhat_locked', 'true');
          location.hash = '#/error';
        } else {
          document.getElementById('timer-countdown').innerText =
            `${String(Math.floor(left / 60000)).padStart(2,'0')}:${String(Math.floor((left/1000)%60)).padStart(2,'0')}`;
        }
      }, 250);
    }

    // ══════════════════════════════════════
    // ROUTER BẢO MẬT
    // ══════════════════════════════════════
    window.addEventListener('hashchange', () => {
      const orig  = location.hash || '#/';
      const clean = orig.replace('#/', '').replace('#', '');

      if (orig === '#/guest') {
        sessionStorage.setItem('gate_guest_passed', 'true');
        location.hash = '#/guest/id/create'; return;
      }
      if (orig === '#/aD') {
        sessionStorage.setItem('gate_admin_passed', 'true');
        location.hash = '#/aD/home'; return;
      }
      if (clean.startsWith('guest/id/create') && sessionStorage.getItem('gate_guest_passed') !== 'true') {
        location.hash = '#/error'; return;
      }
      if (clean.startsWith('aD') && sessionStorage.getItem('gate_admin_passed') !== 'true') {
        location.hash = '#/error'; return;
      }
      if ((clean.startsWith('guest/home') || (clean.startsWith('guest/id') && !clean.endsWith('/create'))) &&
          (localStorage.getItem('lnxnhat_locked') === 'true' || !localStorage.getItem('lnxnhat_timer_end') || sessionStorage.getItem('guest_completed') !== 'true')) {
        location.hash = '#/error'; return;
      }

      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById('lock-timer-display').style.display =
        (clean.startsWith('guest/home') || (clean.startsWith('guest/id') && !clean.endsWith('/create'))) ? 'block' : 'none';

      // Hiện ô tìm kiếm tên chỉ ở trang danh sách
      const showSearch = (clean === 'aD/home' || clean === 'guest/home');
      const swEl = document.getElementById('search-wrap-el');
      if (swEl) {
        swEl.style.display = showSearch ? 'block' : 'none';
        // Reset ô tìm kiếm khi chuyển trang
        const si = document.getElementById('search-input');
        if (si && !showSearch) si.value = '';
      }

      if      (clean === 'guest/id/create') { resetGuestForm(); document.getElementById('view-guest-id-create').classList.add('active'); setTimeout(() => initSignatureCanvas('g-canvas'), 50); }
      else if (clean === 'guest/home')      { window.refreshUI(); document.getElementById('view-guest-home').classList.add('active'); startLockCountdown(); }
      else if (clean.startsWith('guest/id') && !clean.endsWith('/create')) { extractDetailRecord(orig.split('?=')[1], 'guest-detail-card', false); document.getElementById('view-guest-id').classList.add('active'); startLockCountdown(); }
      else if (clean === 'aD/home')         { window.refreshUI(); document.getElementById('view-ad-home').classList.add('active'); }
      else if (clean === 'aD/tags')         { document.getElementById('view-ad-tags').classList.add('active'); }
      else if (clean.startsWith('aD/id'))   { extractDetailRecord(orig.split('?=')[1], 'ad-detail-card', true); document.getElementById('view-ad-id').classList.add('active'); }
      else if (clean.startsWith('aD/edit')) { openAdminEditForm(orig.split('?=')[1]); document.getElementById('view-ad-edit').classList.add('active'); }
      else if (clean === 'aD/create')       { resetAdminCreateForm(); document.getElementById('view-ad-create').classList.add('active'); setTimeout(() => initSignatureCanvas('ad-canvas'), 50); }
      else                                   { document.getElementById('view-error').classList.add('active'); }
    });

    window.onload = () => {
      const h = location.hash || '#/';
      if (h !== '#/guest' && h !== '#/aD') {
        if (h.includes('guest/id/create') && sessionStorage.getItem('gate_guest_passed') !== 'true') location.hash = '#/error';
        if (h.includes('aD/')             && sessionStorage.getItem('gate_admin_passed') !== 'true') location.hash = '#/error';
      }
      window.dispatchEvent(new HashChangeEvent('hashchange'));
    };
  </script>
</body>
